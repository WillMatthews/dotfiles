# kitty — terminal emulator
# Palette: Aged Brass (see ~/Documents/THEMES.md). To swap palettes, replace
# everything from "# === colours ===" to "# === end colours ===".

# === font ===
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0
disable_ligatures never
modify_font cell_height 110%

# === cursor ===
cursor_shape           beam
cursor_beam_thickness  1.6
cursor_blink_interval  0
cursor_stop_blinking_after 0

# === scrollback ===
scrollback_lines              20000
scrollback_pager              less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 32

# === mouse ===
mouse_hide_wait    2.0
copy_on_select     no
strip_trailing_spaces smart
url_style          straight
detect_urls        yes

# === window ===
remember_window_size  yes
initial_window_width  120c
initial_window_height 36c
window_padding_width  6
hide_window_decorations no
confirm_os_window_close 0

# === tabs ===
tab_bar_edge          bottom
tab_bar_style         powerline
tab_powerline_style   slanted
tab_title_template    "{index}: {title}"

# === bell ===
# Audio + visual both fire — Claude Code's Notification hook sends BEL when
# it wants your input (see ~/.claude/settings.json).
enable_audio_bell yes
visual_bell_duration 0.05
window_alert_on_bell yes
bell_on_tab "* "

# === performance ===
repaint_delay   8
input_delay     2
sync_to_monitor yes

# === keymaps ===
# Standard copy/paste in addition to the kitty defaults.
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
# Font size on the fly.
map ctrl+shift+equal     change_font_size all +1.0
map ctrl+shift+minus     change_font_size all -1.0
map ctrl+shift+backspace change_font_size all 0
# Splits / tabs.
map ctrl+shift+enter new_window
map ctrl+shift+t     new_tab
map ctrl+shift+w     close_window
map ctrl+shift+]     next_tab
map ctrl+shift+[     previous_tab

# === colours (Aged Brass) ===
foreground            #EFE3CE
background            #2A211B
selection_foreground  #2A211B
selection_background  #FFC332

cursor                #FFC332
cursor_text_color     #2A211B

url_color             #D6A12A

active_tab_foreground   #2A211B
active_tab_background   #FFC332
inactive_tab_foreground #A89880
inactive_tab_background #3A2E25

active_border_color     #FFC332
inactive_border_color   #4E3F32
bell_border_color       #D26653

# 16-colour palette mapped to the Aged Brass family.
# 0/8 = bg shades, 1/9 = error/terracotta, 2/10 = success/sage,
# 3/11 = warning/amber, 4/12 = info (cool muted), 5/13 = accent gold,
# 6/14 = secondary cream, 7/15 = fg shades.
color0  #2A211B
color8  #4E3F32
color1  #A53C2C
color9  #D26653
color2  #5A7548
color10 #8FA672
color3  #C66B1B
color11 #E9994A
color4  #6E8AA1
color12 #9FB4C6
color5  #D6A12A
color13 #FFC332
color6  #A89880
color14 #C4B69C
color7  #EFE3CE
color15 #F6EEDB
# === end colours ===
