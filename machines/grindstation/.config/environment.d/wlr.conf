# wlroots cursor-plane format negotiation fails on the internal eDP panel
# of this laptop. Counterintuitive: the broken plane is on the Intel iGPU
# (i915, card2) which drives eDP-2 — not the NVIDIA 5090. HDMI-A-1, which
# IS on NVIDIA (card1), works fine. Likely an Arrow Lake / Xe2 i915 issue
# at 3840x2400 where the cursor plane only exposes format/modifier combos
# that wlroots's picker rejects.
#
# Symptoms when missing: cursor visibly stutters on the laptop screen but
# not on external HDMI; sway sits at 20-30% CPU at idle; journal floods
# with:
#   wlr: Failed to pick cursor plane format
#   wlr: connector eDP-2: Atomic commit failed: Device or resource busy
#   sway: Page-flip failed on output eDP-2
#
# Fix is a wlroots-global flag (not per-output), so it disables hardware
# cursor on every output. Software cursor adds negligible CPU.
WLR_NO_HARDWARE_CURSORS=1
