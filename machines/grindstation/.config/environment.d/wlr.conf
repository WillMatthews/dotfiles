# wlroots tuning for grindstation. The eDP-2 panel is driven by the
# Intel iGPU (now on the `xe` driver since 2026-05-22) at 2560x1600 up to
# 300Hz. HDMI-A-1 sits on the NVIDIA 5090. Both are now stable hardware-
# wise; the residual issue is wlroots's cursor-plane format negotiation
# failing on eDP-2, which forces wlroots into software cursor and causes
# visible cursor lag at high refresh.
#
# See ~/Documents/SCREEN.md for the full investigation log.
#
# History of attempts (don't repeat verbatim without reading why each
# failed):
#   1. WLR_NO_HARDWARE_CURSORS=1 (2026-05-21):
#      Works as a workaround but at 300Hz the software cursor saturates
#      the commit pipeline, producing cursor lag. Useful only at <=60Hz.
#   2. WLR_DRM_NO_MODIFIERS=1 (2026-05-22):
#      BLACK SCREEN at GDM login. Broke wlroots multi-GPU buffer hand-off
#      to NVIDIA (NVIDIA GBM doesn't accept linear-only allocations for
#      the scanout buffer it has to import). Recovery: TTY, revert, log
#      back in. Do not re-enable without unplugging HDMI first.
#   3. Driver switch i915 -> xe (2026-05-22):
#      Reduced page-flip failure rate ~60% and dropped sway idle CPU,
#      but did NOT fix the underlying wlroots format-picker failure
#      (same `Failed to pick cursor plane format` errors persist).
#      Kept anyway as a strict improvement.
#
# Active attempt (2026-05-22): WLR_RENDERER=vulkan
#   Default wlroots renderer is GLES2. Vulkan path has different cursor
#   format support and may successfully negotiate the cursor plane that
#   GLES2 cannot. Both GPUs expose Vulkan 1.4 via Mesa/NVIDIA ICDs and
#   libwlroots-0.19 is linked against libvulkan, so the path is present.
#   If this works: hardware cursor engages, page-flip failures stop,
#   cursor smooth at 300Hz.
#   If this fails: sway likely starts but with software cursor again
#   (same as current state) — easy revert by commenting this line out.
WLR_RENDERER=vulkan
