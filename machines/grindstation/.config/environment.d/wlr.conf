# wlroots on NVIDIA proprietary driver: the hardware cursor plane fails
# format negotiation, every cursor move triggers an atomic-commit failure,
# and the panel drops frames several times a second. Force software cursor.
#
# Symptoms when missing: journal floods with
#   wlr: Failed to pick cursor plane format
#   wlr: connector eDP-*: Atomic commit failed: Device or resource busy
#   sway: Page-flip failed on output eDP-*
# and sway sits at 20-30% CPU retrying.
WLR_NO_HARDWARE_CURSORS=1
